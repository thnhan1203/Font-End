<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form HTML</title>
</head>
<body>
        <form >
        <!-- Text  -->
        <label for="user">Nhap Username:</label>
        <input type="text" id="user" placeholder="Username">
        <br><br>
        <!-- Password -->
        <label for="pass">Nhap Password:</label>
        <input type="password" id="pass" placeholder="Password">
        <br><br>
        <!-- Email-->
         <label for="email">Nhap Email:</label>
        <input type="email" id="email" placeholder="Email">
        <br><br>
        <!-- Number --> 
         <lablel for="tuoi"> Nhap Tuoi</lablel>
         <input type="tuoi">
         <br><br>
        <!-- Tel -->
         <label for="sdt">Nhap SDT:</label>
        <input type="sdt" id="sdt" placeholder="SDT">
        <br><br>
        <!-- Gioi tinh -->
        <label for="">Gioi tinh:</label>
        <input type="radio" name="gioitinh" > Nam
        <input type="radio" name="gioitinh" > Nu
        <br><br>
        <!-- Checkbox -->
        <label for="">So thich:</label>
        <input type="Checkbox">Shopping
        <input type="Checkbox">Food
        <input type="Checkbox">Travel
        <br><br>  
        <!-- color -->
         <label for="">Cho Mau:</label>
         <input type="color">
    </form>
        <!-- Date -->
         <label for="">Nhap Ngay Sinh:</label>
        <input type="date" >
        <br><br>
        <!-- Time -->
         <label for="">Nhap Thoi Gian:</label>
        <input type="time" >
        <br><br>
        <!-- file -->
         <label for="">Chon File:</label>
        <input type="file" >
        <br><br>

        <!-- Gioi thieu ban than -->
         <label for="">Gioi thieu ban than:</label>
        <textarea ></textarea>
        <br><br>
        <!-- Chon quoc gia -->
         <label for="">Chon Quoc Gia:</label>
        <select >
            <option >Viet Nam</option>
            <option >USA</option>
            <option >Japan</option>
            <option >Korea</option>
        </select>
        <br><br>
        <!-- Nut gui du lieu-->
         <input type="submit" value="Gui ">
         <input type="reset"   value="reset">   
</head>

</body>
</html>
