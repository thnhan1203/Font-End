<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng thông tin học sinh trong lớp</title>
    <!--title hiển thị trên tab của trình duyệt-->
</head>
<body>
    <h1>Bảng thông tin học sinh trong lớp</h1>
    <!--h1 là tiêu đề chính của trang-->
    <table border="1">
        <!-- 
        table tạo bảng
        border="1" tạo viền cho bảng
        -->
        <tr>
            <!--tr tạo hàng 1 trong bảng-->
            <th rowpan="2">Họ Tên </th>
            <th colspan="2">Kết Quả Học Tập</th>
            <!--
            colspan="2" tạo ô kết hợp 2 cột
            rowpan="2" tạo ô kết hợp 2 hàng
            -->
        </tr>

        <!--td là ô dữ liệu trong bảng-->
        <tr>
            <td>Lê Thành Nhân</td>
            <td>Toán</td>
            <td>6</td>
        </tr>
        <tr>
            <td>Trần Văn A</td>
            <td>Lý</td>
            <td>6.5</td>
        </tr>
        <tr>
            <td>Nguyễn Văn B</td>
            <td>Hóa</td>
            <td>7</td>
        </tr>
        <tr>
            <td>Phạm Văn C</td>
            <td>Sinh</td>
            <td>5</td>
        </tr>
    </table>
</body>
</html>
