<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bảng thông tin học sinh trong lớp</title>
</head>
<body>
    <h1>bảng thông tin học sinh trong lớp</h1>
    <table border="1">
        <tr>
            <th rowspan="2">Họ tên</th>
            <th colspan="2">Kết quả học tập</th>
        </tr>
        <tr>
            <th>Môn học</th>
            <th>Điểm</th>
        </tr>

        <tr>
            <td>Nguyễn Văn A</td>
            <td>Toán</td>
            <td>9</td>
        </tr>

        <tr>
            <td>Trần Minh B</td>
            <td>Lý</td>
            <td>7.5</td>
        </tr>

        <tr>
            <td>Lê Văn C</td>
            <td>Hóa</td>
            <td>8</td>
        </tr>

        <tr>
            <td>Phạm Văn D</td>
            <td>Tiếng Anh</td>
            <td>7.5</td>
        </tr>
    </table>
</body>
</html>
