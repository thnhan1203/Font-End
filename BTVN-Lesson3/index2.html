<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form đăng ký sự kiện</title>
</head>
<body>

<h1>Form đăng ký sự kiện</h1>

<form>

    <label for="hoten">Nhập Họ tên:</label>
    <input type="text" id="hoten" placeholder="Họ tên">
    <br><br>

    <label for="email">Nhập Email:</label>
    <input type="email" id="email" placeholder="Email">
    <br><br>

    <label for="thoigian">Thời gian tham gia:</label>
    <input type="datetime-local" id="thoigian">
    <br><br>

    <label>Giới tính:</label>
    <input type="radio" name="gioitinh"> Nam
    <input type="radio" name="gioitinh"> Nữ
    <br><br>

    <input type="submit" value="Xác nhận">

</form>

</body>
</html>
