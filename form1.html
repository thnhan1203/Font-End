<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form action="">
        <table>
            <tr>
                <th>Registration Form</th>
            </tr>
            <tr>
                <td><label for="first">First Name:</label></td>
                <td><input type="text" id="first" name="first" placeholder="Enter first name"></td>
            </tr>
            <tr>
                <td><label for="last">Last name:</label></td>
                <td><input type="text" id="last" placeholder="Enter last name"></td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email"  placeholder="Enter Email Address"></td>
            </tr>
            <tr>
                <td><label for="pass">Password:</label></td>
                <td><input type="password" id="pass"  ></td>
            </tr>
            <tr>
                <td><label for="">Gender:</label></td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                    <input type="radio" name="gender"> Other
                </td>
            </tr>
            <tr>
                <td><label for="age">Age:</label></td>
                <td>
                    <input type="number">
                </td>
            </tr>
            <tr> 
                
                <tr>
                    <td><label for="">Preferences</label></td>
                    <td>
                        <input type="checkbox"> Acrylic Painting
                        <input type="checkbox"> oil Panting
                        <input type="checkbox"> Watercolor Painting
                </tr>
            <tr>
                <td><label for="occupation">Select Occupation</label></td>
                <td>
                    <select name="occupation" id="occupation">
                        <option >Student</option>
                        <option >Teacher</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="">Bio</label></td>
                <td><textarea ></textarea></td>
            </tr>
            <tr>
                <td><input type="submit" value="Submit"></td>
                <td><input type="reset" value="Reset"></td>
            </tr>
        </table>
    </form>
</body>
</html>
