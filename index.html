<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoc HTML</title>
    <style>
        #text {
            font-size: 30px;
            color: red;
        }
    </style>
</head>
<body>
   <p id="text">hom nay la mot ngay de troi</p>
   <script>
    const p = document.getElementById('text');
    p.onclick = function() {
        this.innerText = 'Ban da click vao noi dung nay';
    }
   </script>
</body>
</html>
